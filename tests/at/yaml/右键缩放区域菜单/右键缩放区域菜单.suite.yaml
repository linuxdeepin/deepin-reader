    - 双页显示
  - action: mouse_click
    selector:
      name: DLineEditChildLineEdit
      role: text
    items:
    - 默认大小
  - action: mouse_click
    selector:
      name: DLineEditChildLineEdit
      role: text
    items:
    - 适合页面
  - action: mouse_click
    selector:
      name: DLineEditChildLineEdit
      role: text
    items:
    - 适应高度
  - action: mouse_click
    selector:
      name: DLineEditChildLineEdit
      role: text
    items:
    - 适应宽度
  assert_steps:
