- id: suite_context_menu_scale
  name: 右键缩放区域菜单 — 所有菜单项
  module: 右键缩放区域菜单
  annotation:
    测试界面: 右键缩放区域菜单
    测试功能: 缩放菜单所有菜单项
    前置条件: deepin-reader 已打开一个 PDF 文档
    AT元素: n227 (DLineEditChildLineEdit, text, 输入缩放比例)
  steps:
  - step_type: action
    description: 启动 deepin-reader 并打开文档
    action: session_start
    command: deepin-reader ${TEST_FILES_DIR}/normal.pdf
  - step_type: action
    description: 点击文档区域确保焦点在文档上
    action: mouse_click
    selector:
      name: pageEdit
      role: panel
  - step_type: action
    description: 在缩放输入区域右键，选择"双页视图"
    action: dtk_context_menu
    selector:
      name: DLineEditChildLineEdit
      role: text
    items:
    - 双页显示
  - step_type: action
    description: 在缩放输入区域右键，选择"实际大小"
    action: dtk_context_menu
    selector:
      name: DLineEditChildLineEdit
      role: text
    items:
    - 默认大小
  - step_type: action
    description: 在缩放输入区域右键，选择"适合页面"
    action: dtk_context_menu
    selector:
      name: DLineEditChildLineEdit
      role: text
    items:
    - 适合页面
  - step_type: action
    description: 在缩放输入区域右键，选择"适合高度"
    action: dtk_context_menu
    selector:
      name: DLineEditChildLineEdit
      role: text
    items:
    - 适应高度
  - step_type: action
    description: 在缩放输入区域右键，选择"适合宽度"
    action: dtk_context_menu
    selector:
      name: DLineEditChildLineEdit
      role: text
    items:
    - 适应宽度
  - step_type: assert
    description: 菜单操作后应用仍正常响应
    element_ref: n6
    selector:
      name: Button_SelectFile
      role: button
    action: assert_element
