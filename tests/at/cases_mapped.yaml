    selector:
      name: pageEdit
      role: panel
    description: mouse_click
  - step_type: action
    action: dtk_context_menu
    selector:
      name: pageEdit
      role: panel
    items:
    - 搜索
    description: dtk_context_menu
  - step_type: action
    action: keyboard_press
    key: Escape
    description: keyboard_press
  - step_type: action
    action: mouse_click
    selector:
      name: pageEdit
      role: panel
    description: mouse_click
  - step_type: action
    action: dtk_context_menu
    selector:
      name: pageEdit
      role: panel
    items:
    - 后一页
    description: dtk_context_menu
  - step_type: action
    action: mouse_click
    selector:
      name: pageEdit
      role: panel
    description: mouse_click
  - step_type: action
    action: dtk_context_menu
    selector:
      name: pageEdit
      role: panel
    items:
    - 第一页
    description: dtk_context_menu
  - step_type: action
    action: mouse_click
    selector:
      name: pageEdit
      role: panel
