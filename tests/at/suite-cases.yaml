  status: active
  annotation:
    测试界面: 标题栏主题菜单
    测试功能: 浅色/深色/跟随系统主题切换
    前置条件: deepin-reader 已打开，标题栏主题菜单可用
    AT元素引用: Button_SelectFile, 浅色, 深色, 跟随系统
  steps:
  - step_type: action
    description: 启动 deepin-reader，不打开文档
    action: session_start
  - step_type: action
    description: 打开主题菜单，选择"浅色"
    action: dtk_main_menu
    items:
    - 浅色
  - step_type: assert
    description: 应用切换到浅色主题，主界面仍然响应
    element_ref: n6
    selector:
      name: Button_SelectFile
      role: button
    action: assert_visible
  - step_type: action
    description: 打开主题菜单，选择"深色"
    action: dtk_main_menu
    items:
    - 深色
  - step_type: assert
    description: 应用切换到深色主题，主界面仍然响应
    element_ref: n6
    selector:
      name: Button_SelectFile
      role: button
    action: assert_visible
  - step_type: action
    description: 打开主题菜单，选择"跟随系统"
    action: dtk_main_menu
    items:
    - 跟随系统
  - step_type: assert
    description: 应用主题跟随系统设置，主界面仍然响应
    element_ref: n6
    selector:
      name: Button_SelectFile
      role: button
    action: assert_visible
