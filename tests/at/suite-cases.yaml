- id: suite_theme_menu
  name: 标题栏主题菜单 — 浅色/深色/跟随系统切换
  status: active
  annotation:
    测试界面: 标题栏主题菜单
    测试功能: 浅色/深色/跟随系统主题切换
    前置条件: deepin-reader 已打开，标题栏主题菜单已展开
    AT元素引用: 浅色, 深色, 跟随系统
  steps:
  - step_type: action
    description: 点击工具栏中的菜单键，鼠标放置在主题菜单上
    action: dtk_main_menu
  - step_type: assert
    description: 弹出三个主题菜单：浅色、深色、跟随主题
    element_ref: n254
    selector:
      name: 浅色
      role: menu item
    action: assert_visible
  - step_type: action
    description: 点击浅色主题
    element_ref: n254
    selector:
      name: 浅色
      role: menu item
    action: click
  - step_type: assert
    description: 应用切换到浅色主题
    action: assert_visible
  - step_type: action
    description: 重新打开主题菜单，点击深色主题
    element_ref: n255
    selector:
      name: 深色
      role: menu item
    action: click
  - step_type: assert
    description: 应用切换到深色主题
    action: assert_visible
  - step_type: action
    description: 重新打开主题菜单，点击跟随系统
    element_ref: n256
    selector:
      name: 跟随系统
      role: menu item
    action: click
  - step_type: assert
    description: 应用主题跟随系统设置
    action: assert_visible
