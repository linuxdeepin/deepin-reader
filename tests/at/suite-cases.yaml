version: '1.0'
metadata:
  source: 文档查看器V25-用例.xlsx → cases_raw.yaml
  normalized_at: '2026-07-16'
  normalizer: LLM-assisted + human review
  non_gui_cases:
    count: 12
    reason: 'll-cli terminal commands, not GUI automation'
    case_ids:
    - case_1704991
    - case_1704989
    - case_1704987
    - case_1704985
    - case_1704983
    - case_1704981
    - case_1704975
    - case_1704971
