cases:
- id: suite_main_no_doc
  name: 主界面 — 无文档打开 — 打开文件
  status: active
  annotation:
    测试界面: 主界面 — 无文档打开
    测试功能: 打开文件
    前置条件: deepin-reader 已启动，未打开任何文档
    AT元素引用: Button_SelectFile
  steps:
  - step_type: action
    description: 启动 deepin-reader，不打开任何文档
    action: session_start
  - step_type: assert
    description: 主界面显示打开文件按钮(Button_SelectFile)
    element_ref: n6
    selector:
      name: Button_SelectFile
      role: button
    action: assert_visible
  - step_type: action
    description: 点击打开文件按钮
    element_ref: n6
    selector:
      name: Button_SelectFile
      role: button
    action: click
  - step_type: assert
    description: 弹出系统文件选择对话框
    action: assert_visible
- id: suite_sidebar_tabs
  name: 左侧栏 — 按钮切换 — 缩略图/目录/书签/注释
  status: active
  annotation:
    测试界面: 左侧栏 — 按钮切换
    测试功能: 侧边栏四个功能按钮切换（缩略图/目录/书签/注释）
    前置条件: deepin-reader 已打开一个 PDF 文档
    AT元素引用: Button_thumbnail, Button_catalog, Button_bookmark, Button_annotation,
      Button_search, View_CatalogTree, Button_BookmarkAdd, Button_NotesAdd
  steps:
  - step_type: action
    description: 打开文档，展开左侧栏，点击缩略图按钮
    element_ref: n14
    selector:
      name: Button_thumbnail
      role: check box
    action: click
  - step_type: assert
    description: 显示缩略图视图，含页数输入框和翻页按钮
    element_ref: n14
    selector:
      name: Button_thumbnail
      role: check box
    action: assert_checked
  - step_type: action
    description: 点击目录按钮
    element_ref: n15
    selector:
      name: Button_catalog
      role: check box
    action: click
  - step_type: assert
    description: 显示目录视图(View_CatalogTree)
    element_ref: n163
    selector:
      name: View_CatalogTree
      role: tree
    action: assert_visible
  - step_type: action
    description: 点击书签按钮
    element_ref: n16
    selector:
      name: Button_bookmark
      role: check box
    action: click
  - step_type: assert
    description: 显示书签视图，含添加书签按钮(Button_BookmarkAdd)
    element_ref: n22
    selector:
      name: Button_BookmarkAdd
      role: button
    action: assert_visible
  - step_type: action
    description: 点击注释按钮
    element_ref: n17
    selector:
      name: Button_annotation
      role: check box
    action: click
  - step_type: assert
    description: 显示注释视图，含添加注释按钮(Button_NotesAdd)
    element_ref: n49
    selector:
      name: Button_NotesAdd
      role: button
    action: assert_visible
- id: suite_sidebar_thumbnails
  name: 左侧栏 — 缩略图视图 — 分页导航
  status: active
  annotation:
    测试界面: 左侧栏 — 缩略图视图
    测试功能: 缩略图分页导航
    前置条件: deepin-reader 已打开一个多页 PDF 文档，左侧栏展开且选中缩略图视图
    AT元素引用: pageEdit, Button_ThumbnailPre, Button_ThumbnailNext, DLineEditChildLineEdit
  steps:
  - step_type: action
    description: 删除底部页数框(pageEdit)中的数值
    element_ref: n156
    selector:
      name: pageEdit
      role: text
    action: clear
  - step_type: action
    description: 点击窗口内其他位置
    action: click
  - step_type: assert
    description: 输入框中应该再次显示最近一次的数据
    element_ref: n156
    selector:
      name: pageEdit
      role: text
    action: assert_visible
- id: suite_tab_management
  name: 顶部标签页栏 — 添加/滚动/切换
  status: active
  annotation:
    测试界面: 顶部标签页栏
    测试功能: 标签页添加、滚动、关闭
    前置条件: deepin-reader 已打开一个 PDF 文档
    AT元素引用: normal.pdf, DTabBarAddButton, 向左滚动, 向右滚动
  steps:
  - step_type: action
    description: 点击新建标签页按钮(DTabBarAddButton)
    element_ref: n213
    selector:
      name: DTabBarAddButton
      role: button
    action: click
  - step_type: assert
    description: 标签栏需全部占满，无空出区域；标签页最小140px
    element_ref: n209
    selector:
      name: normal.pdf
      role: page tab list
    action: assert_visible
  - step_type: action
    description: 点击左移按钮
    element_ref: n211
    selector:
      name: 向左滚动
      role: button
    action: click
  - step_type: assert
    description: 标签页正常向左滚动
    element_ref: n211
    selector:
      name: 向左滚动
      role: button
    action: assert_visible
  - step_type: action
    description: 点击右移按钮
    element_ref: n212
    selector:
      name: 向右滚动
      role: button
    action: click
  - step_type: assert
    description: 标签页正常向右滚动
    element_ref: n212
    selector:
      name: 向右滚动
      role: button
    action: assert_visible
- id: suite_titlebar_search
  name: 标题栏搜索框 — 关键字输入/清除/搜索
  status: active
  annotation:
    测试界面: 标题栏搜索框
    测试功能: 搜索关键字输入、清除、搜索执行
    前置条件: deepin-reader 已打开一个 PDF 文档
    AT元素引用: DLineEditChildLineEdit, DLineEditClearButton, DSearchEditIconButton
  steps:
  - step_type: action
    description: 点击搜索框输入关键字
    element_ref: n243
    selector:
      name: DLineEditChildLineEdit
      role: text
    action: input
  - step_type: action
    description: 点击键盘enter键搜索
    action: keyboard_press_key
  - step_type: assert
    description: 正常显示搜索结果
    action: assert_visible
  - step_type: action
    description: 点击搜索框右侧清除按钮(DLineEditClearButton)
    element_ref: n244
    selector:
      name: DLineEditClearButton
      role: button
    action: click
  - step_type: assert
    description: 可以正常关闭搜索，搜索框和搜索结果都会消失
    action: assert_not_visible
- id: suite_titlebar_scale
  name: 标题栏缩放输入框 — 缩放比例输入
  status: active
  annotation:
    测试界面: 标题栏缩放输入框
    测试功能: 缩放比例输入
